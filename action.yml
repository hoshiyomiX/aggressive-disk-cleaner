name: 'Aggressive Disk Cleaner'
description: 'Fast and aggressive disk space cleanup for GitHub Actions runners - frees up to 30GB+'
author: 'hoshiyomiX'

branding:
  icon: 'hard-drive'
  color: 'red'

inputs:
  # APK Build Mode (for Android app builds)
  keep_apk_build:
    description: 'Keep dependencies for APK builds (Android SDK build-tools/platforms, Java, Node.js, Gradle cache) - removes NDK to save ~3GB'
    required: false
    default: false

  # Essential build tools (keep options)
  keep_node:
    description: 'Keep Node.js toolchains (~570MB)'
    required: false
    default: true
  keep_python:
    description: 'Keep Python toolchains (~1.7GB)'
    required: false
    default: true
  keep_go:
    description: 'Keep Go toolchains (~1.1GB)'
    required: false
    default: true
  keep_java:
    description: 'Keep Java JDKs (~1.5GB)'
    required: false
    default: true
  keep_dotnet:
    description: 'Keep .NET SDK (~4.2GB)'
    required: false
    default: true
  keep_ruby:
    description: 'Keep Ruby toolchains (~313MB)'
    required: false
    default: false
    
  # Large optional cleanups
  clean_android:
    description: 'Clean Android SDK/NDK (~10GB)'
    required: false
    default: true
  clean_docker:
    description: 'Clean Docker images/volumes (~2GB)'
    required: false
    default: true
  clean_codeql:
    description: 'Clean CodeQL (~1.7GB)'
    required: false
    default: true
  clean_ghc_haskell:
    description: 'Clean Haskell/GHC (~3.7GB)'
    required: false
    default: true
  clean_swift:
    description: 'Clean Swift toolchain (~3.2GB)'
    required: false
    default: true
  clean_powershell:
    description: 'Clean PowerShell modules (~1.3GB)'
    required: false
    default: true
  clean_julia:
    description: 'Clean Julia (~1GB)'
    required: false
    default: true
  clean_google_cloud:
    description: 'Clean Google Cloud SDK (~1GB)'
    required: false
    default: true
  clean_azure_cli:
    description: 'Clean Azure CLI (~1.2GB)'
    required: false
    default: true
  clean_miniconda:
    description: 'Clean Miniconda (~860MB)'
    required: false
    default: true
  clean_llvm_extra:
    description: 'Clean extra LLVM versions (~1.9GB)'
    required: false
    default: true
  clean_browsers:
    description: 'Clean Firefox/Chromium/Edge (~1.7GB)'
    required: false
    default: true
    
  # Additional cleanups
  clean_rust:
    description: 'Clean Rust toolchains (~600MB)'
    required: false
    default: true
  clean_packer:
    description: 'Clean /home/packer (~680MB)'
    required: false
    default: true
  clean_skel:
    description: 'Clean /etc/skel duplicates (~680MB)'
    required: false
    default: true
  clean_linuxbrew:
    description: 'Clean Homebrew (~188MB)'
    required: false
    default: true
  clean_build_caches:
    description: 'Clean Gradle/Maven/vcpkg (~400MB)'
    required: false
    default: true
  clean_misc:
    description: 'Clean docs/AWS CLI/pipx (~1.2GB)'
    required: false
    default: true
  clean_swap:
    description: 'Disable swap file (~3GB)'
    required: false
    default: false

runs:
  using: 'composite'
  steps:
    - name: Check Initial Disk Space
      shell: bash
      run: |
        echo "=========================================="
        echo "DISK SPACE USAGE (BEFORE CLEANUP)"
        echo "=========================================="
        df -h /
        
        BEFORE_USED=$(df --output=used / | awk 'NR==2' | tr -d ' ')
        BEFORE_AVAIL=$(df --output=avail / | awk 'NR==2' | tr -d ' ')
        BEFORE_USED_GB=$((BEFORE_USED / 1024 / 1024))
        BEFORE_AVAIL_GB=$((BEFORE_AVAIL / 1024 / 1024))
        
        echo "BEFORE_USED_GB=${BEFORE_USED_GB}" >> $GITHUB_ENV
        echo "BEFORE_AVAIL_GB=${BEFORE_AVAIL_GB}" >> $GITHUB_ENV
        
        echo ""
        echo "Used: ${BEFORE_USED_GB}GB | Available: ${BEFORE_AVAIL_GB}GB"

    - name: Phase 1 - Essential Cleanups
      shell: bash
      run: |
        echo "=== Phase 1: Essential Cleanups ==="
        
        # Parallel cleanup
        (sudo apt-get clean && sudo rm -rf /var/lib/apt/lists/* /var/cache/apt/*) &
        (sudo rm -rf /tmp/* /var/tmp/*) &
        (sudo rm -rf /home/runner/.cache/* /home/packer/.cache/* /root/.cache/*) &
        (sudo rm -rf /opt/hostedtoolcache/PyPy) &
        
        wait
        echo "Phase 1 complete!"

    - name: Phase 2 - Large Tool Cleanups
      shell: bash
      run: |
        echo "=== Phase 2: Large Tool Cleanups ==="
        
        # CodeQL
        if [ "${{ inputs.clean_codeql }}" = "true" ]; then
          echo "[CodeQL] Removing... (~1.7GB)"
          sudo rm -rf /opt/hostedtoolcache/CodeQL
        fi
        
        # Android SDK
        if [ "${{ inputs.keep_apk_build }}" = "true" ]; then
          echo "[Android] APK build mode: Keeping SDK, removing NDK only... (~3GB saved)"
          # Keep: build-tools, platforms, cmdline-tools (needed for APK)
          # Remove: NDK (not needed for most APK builds)
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /usr/local/lib/android/sdk/cmake
          sudo rm -rf /usr/local/lib/android/sdk/extras
        elif [ "${{ inputs.clean_android }}" = "true" ]; then
          echo "[Android] Removing... (~10GB)"
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /usr/local/lib/android/sdk/build-tools
          sudo rm -rf /usr/local/lib/android/sdk/cmdline-tools
          sudo rm -rf /usr/local/lib/android/sdk/platforms
          sudo rm -rf /usr/local/lib/android/sdk/extras
          sudo rm -rf /usr/local/lib/android/sdk/cmake
        fi
        
        # Docker
        if [ "${{ inputs.clean_docker }}" = "true" ]; then
          echo "[Docker] Cleaning... (~2GB)"
          sudo docker system prune -af --volumes 2>/dev/null || true
          sudo docker builder prune -af 2>/dev/null || true
        fi
        
        # Haskell/GHC
        if [ "${{ inputs.clean_ghc_haskell }}" = "true" ]; then
          echo "[Haskell] Removing... (~3.7GB)"
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /root/.ghcup
        fi
        
        # Swift
        if [ "${{ inputs.clean_swift }}" = "true" ]; then
          echo "[Swift] Removing... (~3.2GB)"
          sudo rm -rf /usr/share/swift
        fi
        
        # .NET (only if not keeping)
        if [ "${{ inputs.keep_dotnet }}" != "true" ]; then
          echo "[.NET] Removing... (~4.2GB)"
          sudo rm -rf /usr/share/dotnet
        fi

    - name: Phase 3 - Medium Tool Cleanups
      shell: bash
      run: |
        echo "=== Phase 3: Medium Tool Cleanups ==="
        
        # PowerShell
        if [ "${{ inputs.clean_powershell }}" = "true" ]; then
          echo "[PowerShell] Removing... (~1.3GB)"
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /opt/microsoft/powershell
        fi
        
        # Julia
        if [ "${{ inputs.clean_julia }}" = "true" ]; then
          echo "[Julia] Removing... (~1GB)"
          sudo rm -rf /usr/local/julia*
        fi
        
        # Google Cloud SDK
        if [ "${{ inputs.clean_google_cloud }}" = "true" ]; then
          echo "[Google Cloud] Removing... (~1GB)"
          sudo rm -rf /usr/lib/google-cloud-sdk
        fi
        
        # Azure CLI
        if [ "${{ inputs.clean_azure_cli }}" = "true" ]; then
          echo "[Azure CLI] Removing... (~1.2GB)"
          sudo rm -rf /opt/az
          sudo rm -rf /usr/share/az_*
        fi
        
        # Miniconda
        if [ "${{ inputs.clean_miniconda }}" = "true" ]; then
          echo "[Miniconda] Removing... (~860MB)"
          sudo rm -rf /usr/share/miniconda
        fi
        
        # LLVM extra
        if [ "${{ inputs.clean_llvm_extra }}" = "true" ]; then
          echo "[LLVM] Removing extra versions... (~1.9GB)"
          sudo rm -rf /usr/lib/llvm-16 /usr/lib/llvm-17
        fi
        
        # Browsers (Firefox/Chromium/Edge)
        if [ "${{ inputs.clean_browsers }}" = "true" ]; then
          echo "[Browsers] Removing... (~1.7GB)"
          sudo rm -rf /usr/lib/firefox
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /opt/microsoft/msedge
          sudo rm -rf /opt/microsoft/edge
        fi

    - name: Phase 4 - Optional Toolchain Cleanups
      shell: bash
      run: |
        echo "=== Phase 4: Optional Toolchain Cleanups ==="
        
        # Node.js (keep if keep_apk_build or keep_node)
        if [ "${{ inputs.keep_apk_build }}" = "true" ]; then
          echo "[Node.js] Keeping for APK build... (~570MB)"
        elif [ "${{ inputs.keep_node }}" != "true" ]; then
          echo "[Node.js] Removing... (~570MB)"
          sudo rm -rf /opt/hostedtoolcache/node
          sudo rm -rf /home/runner/.npm /home/runner/.nvm
        fi
        
        # Python
        if [ "${{ inputs.keep_python }}" != "true" ]; then
          echo "[Python] Removing... (~1.7GB)"
          sudo rm -rf /opt/hostedtoolcache/Python
          sudo rm -rf /home/runner/.cache/pip
        fi
        
        # Go
        if [ "${{ inputs.keep_go }}" != "true" ]; then
          echo "[Go] Removing... (~1.1GB)"
          sudo rm -rf /opt/hostedtoolcache/go
          sudo rm -rf /home/runner/go
        fi
        
        # Java (keep if keep_apk_build or keep_java)
        if [ "${{ inputs.keep_apk_build }}" = "true" ]; then
          echo "[Java] Keeping for APK build... (~1.5GB)"
        elif [ "${{ inputs.keep_java }}" != "true" ]; then
          echo "[Java] Removing... (~1.5GB)"
          sudo rm -rf /usr/lib/jvm
        fi
        
        # Ruby
        if [ "${{ inputs.keep_ruby }}" != "true" ]; then
          echo "[Ruby] Removing... (~313MB)"
          sudo rm -rf /opt/hostedtoolcache/Ruby
          sudo rm -rf /home/runner/.gem
        fi
        
        # Rust
        if [ "${{ inputs.clean_rust }}" = "true" ]; then
          echo "[Rust] Removing... (~600MB)"
          sudo rm -rf /home/runner/.rustup /home/runner/.cargo
          sudo rm -rf /home/packer/.rustup /home/packer/.cargo
          sudo rm -rf /etc/skel/.rustup /etc/skel/.cargo
          sudo rm -rf /root/.rustup /root/.cargo
        fi

    - name: Phase 5 - Additional Cleanups
      shell: bash
      run: |
        echo "=== Phase 5: Additional Cleanups ==="
        
        # Packer home
        if [ "${{ inputs.clean_packer }}" = "true" ]; then
          echo "[Packer] Cleaning... (~680MB)"
          sudo rm -rf /home/packer/.rustup /home/packer/.cargo
          sudo rm -rf /home/packer/.dotnet /home/packer/.gradle /home/packer/.m2
          sudo rm -rf /home/packer/.npm /home/packer/.nuget /home/packer/.cache
        fi
        
        # Skel
        if [ "${{ inputs.clean_skel }}" = "true" ]; then
          echo "[Skel] Cleaning... (~680MB)"
          sudo rm -rf /etc/skel/.rustup /etc/skel/.cargo /etc/skel/.dotnet
          sudo rm -rf /etc/skel/.nvm /etc/skel/.ghcup
        fi
        
        # Linuxbrew
        if [ "${{ inputs.clean_linuxbrew }}" = "true" ]; then
          echo "[Linuxbrew] Removing... (~188MB)"
          sudo rm -rf /home/linuxbrew/.linuxbrew
        fi
        
        # Build caches (Gradle/Maven/vcpkg) - keep if keep_apk_build
        if [ "${{ inputs.keep_apk_build }}" = "true" ]; then
          echo "[Build Caches] Keeping for APK build... (~400MB)"
        elif [ "${{ inputs.clean_build_caches }}" = "true" ]; then
          echo "[Build Caches] Cleaning... (~400MB)"
          sudo rm -rf /home/runner/.gradle /home/runner/.m2
          sudo rm -rf /home/packer/.gradle /home/packer/.m2
          sudo rm -rf /root/.gradle /root/.m2
          sudo rm -rf /usr/share/gradle-* /usr/share/apache-maven-*
          sudo rm -rf /usr/local/share/vcpkg
        fi
        
        # Misc (docs/AWS CLI/pipx)
        if [ "${{ inputs.clean_misc }}" = "true" ]; then
          echo "[Misc] Cleaning docs/AWS CLI/pipx... (~1.2GB)"
          # Docs
          sudo rm -rf /usr/share/man/* /usr/share/doc/* /usr/share/locale/*
          # AWS CLI
          sudo rm -rf /usr/local/aws-cli /usr/local/aws-sam-cli
          sudo rm -rf /root/.aws /home/runner/.aws
          # pipx
          sudo rm -rf /opt/pipx
        fi

    - name: Phase 6 - Swap Cleanup
      shell: bash
      if: ${{ inputs.clean_swap == 'true' }}
      run: |
        echo "=== Phase 6: Swap Cleanup ==="
        if swapon --show | grep -q .; then
          sudo swapoff -a
          sudo rm -f /swapfile /swap.img
          echo "Swap removed! (~3GB)"
        fi

    - name: Verify Disk Space
      shell: bash
      run: |
        echo "=========================================="
        echo "DISK SPACE USAGE (AFTER CLEANUP)"
        echo "=========================================="
        df -h /
        
        AFTER_USED=$(df --output=used / | awk 'NR==2' | tr -d ' ')
        AFTER_AVAIL=$(df --output=avail / | awk 'NR==2' | tr -d ' ')
        AFTER_USED_GB=$((AFTER_USED / 1024 / 1024))
        AFTER_AVAIL_GB=$((AFTER_AVAIL / 1024 / 1024))
        FREED_GB=$((BEFORE_USED_GB - AFTER_USED_GB))
        
        echo ""
        echo "╔══════════════════════════════════════════════════════════════════╗"
        echo "║                    DISK CLEANUP SUMMARY                          ║"
        echo "╠══════════════════════════════════════════════════════════════════╣"
        printf "║  🗑️  DISK SPACE FREED:           %3d GB                        ║\n" "$FREED_GB"
        printf "║  📦 AVAILABLE SPACE NOW:        %3d GB                        ║\n" "$AFTER_AVAIL_GB"
        echo "╚══════════════════════════════════════════════════════════════════╝"
