name: 'Aggressive Disk Cleaner'
description: 'Fast and aggressive disk space cleanup for GitHub Actions runners - frees up to 30GB+ in 30-45 seconds'
author: 'hoshiyomiX'

branding:
  icon: 'hard-drive'
  color: 'red'

inputs:
  # APK Build Mode (for Android app builds)
  keep_apk_build:
    description: 'Keep dependencies for APK builds (Android SDK build-tools/platforms, Java, Node.js, Gradle cache) - removes NDK to save ~3GB'
    required: false
    default: false

  # Essential build tools (keep options)
  keep_node:
    description: 'Keep Node.js toolchains (~570MB)'
    required: false
    default: true
  keep_python:
    description: 'Keep Python toolchains (~1.7GB)'
    required: false
    default: true
  keep_go:
    description: 'Keep Go toolchains (~1.1GB)'
    required: false
    default: true
  keep_java:
    description: 'Keep Java JDKs (~1.5GB)'
    required: false
    default: true
  keep_dotnet:
    description: 'Keep .NET SDK (~4.2GB)'
    required: false
    default: true
  keep_ruby:
    description: 'Keep Ruby toolchains (~313MB)'
    required: false
    default: false

  # Large optional cleanups
  clean_android:
    description: 'Clean Android SDK/NDK (~10GB)'
    required: false
    default: true
  clean_docker:
    description: 'Clean Docker images/volumes (~2GB)'
    required: false
    default: true
  clean_codeql:
    description: 'Clean CodeQL (~1.7GB)'
    required: false
    default: true
  clean_ghc_haskell:
    description: 'Clean Haskell/GHC (~3.7GB)'
    required: false
    default: true
  clean_swift:
    description: 'Clean Swift toolchain (~3.2GB)'
    required: false
    default: true
  clean_powershell:
    description: 'Clean PowerShell modules (~1.3GB)'
    required: false
    default: true
  clean_julia:
    description: 'Clean Julia (~1GB)'
    required: false
    default: true
  clean_google_cloud:
    description: 'Clean Google Cloud SDK (~1GB)'
    required: false
    default: true
  clean_azure_cli:
    description: 'Clean Azure CLI (~1.2GB)'
    required: false
    default: true
  clean_miniconda:
    description: 'Clean Miniconda (~860MB)'
    required: false
    default: true
  clean_llvm_extra:
    description: 'Clean extra LLVM versions (~1.9GB)'
    required: false
    default: true
  clean_browsers:
    description: 'Clean Firefox/Chromium/Edge (~1.7GB)'
    required: false
    default: true

  # Additional cleanups
  clean_rust:
    description: 'Clean Rust toolchains (~600MB)'
    required: false
    default: true
  clean_packer:
    description: 'Clean /home/packer (~680MB)'
    required: false
    default: true
  clean_skel:
    description: 'Clean /etc/skel duplicates (~680MB)'
    required: false
    default: true
  clean_linuxbrew:
    description: 'Clean Homebrew (~188MB)'
    required: false
    default: true
  clean_build_caches:
    description: 'Clean Gradle/Maven/vcpkg (~400MB)'
    required: false
    default: true
  clean_misc:
    description: 'Clean docs/AWS CLI/pipx (~1.2GB)'
    required: false
    default: true
  clean_swap:
    description: 'Disable swap file (~3GB)'
    required: false
    default: false

runs:
  using: 'composite'
  steps:
    - name: Check Initial Disk Space
      shell: bash
      run: |
        echo "=========================================="
        echo "DISK SPACE USAGE (BEFORE CLEANUP)"
        echo "=========================================="
        df -h /

        BEFORE_USED=$(df --output=used / | awk 'NR==2' | tr -d ' ')
        BEFORE_AVAIL=$(df --output=avail / | awk 'NR==2' | tr -d ' ')
        BEFORE_USED_GB=$((BEFORE_USED / 1024 / 1024))
        BEFORE_AVAIL_GB=$((BEFORE_AVAIL / 1024 / 1024))

        echo "BEFORE_USED_GB=${BEFORE_USED_GB}" >> $GITHUB_ENV
        echo "BEFORE_AVAIL_GB=${BEFORE_AVAIL_GB}" >> $GITHUB_ENV
        echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

        echo ""
        echo "Used: ${BEFORE_USED_GB}GB | Available: ${BEFORE_AVAIL_GB}GB"

    - name: Aggressive Parallel Cleanup
      shell: bash
      run: |
        echo "=== 🚀 Starting Aggressive Parallel Cleanup ==="

        # ============================================================
        # LAYER 1: Always Clean (No Conditions) - Run in Parallel
        # ============================================================
        (
          sudo apt-get clean 2>/dev/null
          sudo rm -rf /var/lib/apt/lists/* /var/cache/apt/* 2>/dev/null
        ) &

        sudo rm -rf /tmp/* /var/tmp/* 2>/dev/null &

        sudo rm -rf /home/runner/.cache/* /home/packer/.cache/* /root/.cache/* 2>/dev/null &

        sudo rm -rf /opt/hostedtoolcache/PyPy 2>/dev/null &

        # ============================================================
        # LAYER 2: Large Tools - Parallel Conditional Cleanup
        # ============================================================

        # CodeQL
        [ "${{ inputs.clean_codeql }}" = "true" ] && sudo rm -rf /opt/hostedtoolcache/CodeQL 2>/dev/null &

        # Android SDK - Handle APK build mode or full cleanup
        if [ "${{ inputs.keep_apk_build }}" = "true" ]; then
          sudo rm -rf /usr/local/lib/android/sdk/ndk /usr/local/lib/android/sdk/cmake /usr/local/lib/android/sdk/extras 2>/dev/null &
        elif [ "${{ inputs.clean_android }}" = "true" ]; then
          sudo rm -rf /usr/local/lib/android/sdk/{ndk,build-tools,cmdline-tools,platforms,extras,cmake} 2>/dev/null &
        fi &

        # Docker
        [ "${{ inputs.clean_docker }}" = "true" ] && { sudo docker system prune -af --volumes 2>/dev/null; sudo docker builder prune -af 2>/dev/null; } &

        # Haskell/GHC
        [ "${{ inputs.clean_ghc_haskell }}" = "true" ] && sudo rm -rf /usr/local/.ghcup /root/.ghcup 2>/dev/null &

        # Swift
        [ "${{ inputs.clean_swift }}" = "true" ] && sudo rm -rf /usr/share/swift 2>/dev/null &

        # .NET
        [ "${{ inputs.keep_dotnet }}" != "true" ] && sudo rm -rf /usr/share/dotnet 2>/dev/null &

        # ============================================================
        # LAYER 3: Medium Tools - Parallel Conditional Cleanup
        # ============================================================

        [ "${{ inputs.clean_powershell }}" = "true" ] && sudo rm -rf /usr/local/share/powershell /opt/microsoft/powershell 2>/dev/null &

        [ "${{ inputs.clean_julia }}" = "true" ] && sudo rm -rf /usr/local/julia* 2>/dev/null &

        [ "${{ inputs.clean_google_cloud }}" = "true" ] && sudo rm -rf /usr/lib/google-cloud-sdk 2>/dev/null &

        [ "${{ inputs.clean_azure_cli }}" = "true" ] && sudo rm -rf /opt/az /usr/share/az_* 2>/dev/null &

        [ "${{ inputs.clean_miniconda }}" = "true" ] && sudo rm -rf /usr/share/miniconda 2>/dev/null &

        [ "${{ inputs.clean_llvm_extra }}" = "true" ] && sudo rm -rf /usr/lib/llvm-16 /usr/lib/llvm-17 2>/dev/null &

        [ "${{ inputs.clean_browsers }}" = "true" ] && sudo rm -rf /usr/lib/firefox /usr/local/share/chromium /opt/microsoft/msedge /opt/microsoft/edge 2>/dev/null &

        # ============================================================
        # LAYER 4: Toolchains - Parallel Conditional Cleanup
        # ============================================================

        # Node.js (keep if keep_apk_build or keep_node)
        [ "${{ inputs.keep_apk_build }}" != "true" ] && [ "${{ inputs.keep_node }}" != "true" ] && sudo rm -rf /opt/hostedtoolcache/node /home/runner/.npm /home/runner/.nvm 2>/dev/null &

        # Python
        [ "${{ inputs.keep_python }}" != "true" ] && sudo rm -rf /opt/hostedtoolcache/Python /home/runner/.cache/pip 2>/dev/null &

        # Go
        [ "${{ inputs.keep_go }}" != "true" ] && sudo rm -rf /opt/hostedtoolcache/go /home/runner/go 2>/dev/null &

        # Java (keep if keep_apk_build or keep_java)
        [ "${{ inputs.keep_apk_build }}" != "true" ] && [ "${{ inputs.keep_java }}" != "true" ] && sudo rm -rf /usr/lib/jvm 2>/dev/null &

        # Ruby
        [ "${{ inputs.keep_ruby }}" != "true" ] && sudo rm -rf /opt/hostedtoolcache/Ruby /home/runner/.gem 2>/dev/null &

        # Rust
        [ "${{ inputs.clean_rust }}" = "true" ] && sudo rm -rf /home/runner/.{rustup,cargo} /home/packer/.{rustup,cargo} /etc/skel/.{rustup,cargo} /root/.{rustup,cargo} 2>/dev/null &

        # ============================================================
        # LAYER 5: Additional - Parallel Conditional Cleanup
        # ============================================================

        [ "${{ inputs.clean_packer }}" = "true" ] && sudo rm -rf /home/packer/.{rustup,cargo,dotnet,gradle,m2,npm,nuget,cache} 2>/dev/null &

        [ "${{ inputs.clean_skel }}" = "true" ] && sudo rm -rf /etc/skel/.{rustup,cargo,dotnet,nvm,ghcup} 2>/dev/null &

        [ "${{ inputs.clean_linuxbrew }}" = "true" ] && sudo rm -rf /home/linuxbrew/.linuxbrew 2>/dev/null &

        # Build caches (keep if keep_apk_build)
        [ "${{ inputs.keep_apk_build }}" != "true" ] && [ "${{ inputs.clean_build_caches }}" = "true" ] && sudo rm -rf /home/runner/.{gradle,m2} /home/packer/.{gradle,m2} /root/.{gradle,m2} /usr/share/gradle-* /usr/share/apache-maven-* /usr/local/share/vcpkg 2>/dev/null &

        # Misc
        [ "${{ inputs.clean_misc }}" = "true" ] && sudo rm -rf /usr/share/man/* /usr/share/doc/* /usr/share/locale/* /usr/local/aws-cli /usr/local/aws-sam-cli /root/.aws /home/runner/.aws /opt/pipx 2>/dev/null &

        # ============================================================
        # WAIT FOR ALL PARALLEL JOBS
        # ============================================================
        wait

        echo "=== ✅ Parallel Cleanup Complete ==="

    - name: Swap Cleanup
      shell: bash
      if: ${{ inputs.clean_swap == 'true' }}
      run: |
        if swapon --show | grep -q .; then
          sudo swapoff -a
          sudo rm -f /swapfile /swap.img
          echo "Swap removed! (~3GB)"
        fi

    - name: Verify Disk Space
      shell: bash
      run: |
        END_TIME=$(date +%s)
        ELAPSED=$((END_TIME - START_TIME))

        echo "=========================================="
        echo "DISK SPACE USAGE (AFTER CLEANUP)"
        echo "=========================================="
        df -h /

        AFTER_USED=$(df --output=used / | awk 'NR==2' | tr -d ' ')
        AFTER_AVAIL=$(df --output=avail / | awk 'NR==2' | tr -d ' ')
        AFTER_USED_GB=$((AFTER_USED / 1024 / 1024))
        AFTER_AVAIL_GB=$((AFTER_AVAIL / 1024 / 1024))
        FREED_GB=$((BEFORE_USED_GB - AFTER_USED_GB))

        echo ""
        echo "╔══════════════════════════════════════════════════════════════════╗"
        echo "║                    DISK CLEANUP SUMMARY                          ║"
        echo "╠══════════════════════════════════════════════════════════════════╣"
        printf "║  🗑️  DISK SPACE FREED:           %3d GB                        ║\n" "$FREED_GB"
        printf "║  📦 AVAILABLE SPACE NOW:        %3d GB                        ║\n" "$AFTER_AVAIL_GB"
        printf "║  ⏱️  CLEANUP TIME:               %3d seconds                   ║\n" "$ELAPSED"
        echo "╚══════════════════════════════════════════════════════════════════╝"
