name: Disk Space Scanner

on:
  workflow_dispatch:

jobs:
  scan-disk-space:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    
    steps:
      - name: Initial Disk Space Check
        run: |
          echo "=========================================="
          echo "INITIAL DISK SPACE STATUS (ALL FILESYSTEMS)"
          echo "=========================================="
          df -h
          echo ""
          echo "=========================================="
          echo "INODE STATUS"
          echo "=========================================="
          df -i
          echo ""
          echo "=========================================="
          echo "MOUNTED FILESYSTEMS"
          echo "=========================================="
          mount | grep -E "^/dev|^tmpfs|^efivarfs"

      # ============================================================
      # DEEP SCAN /opt DIRECTORY
      # ============================================================
      - name: Deep Scan /opt - Overview
        run: |
          echo "=========================================="
          echo "DEEP SCAN /opt DIRECTORY"
          echo "=========================================="
          
          echo "=== /opt Total Size ==="
          sudo du -sh /opt 2>/dev/null
          
          echo ""
          echo "=== Top-level /opt contents ==="
          sudo du -sh /opt/* 2>/dev/null | sort -rh | head -20
          
      - name: Deep Scan /opt - Toolchains Detail
        run: |
          echo "=========================================="
          echo "/opt/hostedtoolcache DETAILED ANALYSIS"
          echo "=========================================="
          
          echo "=== All Toolchains ==="
          sudo du -sh /opt/hostedtoolcache/* 2>/dev/null | sort -rh
          
          echo ""
          echo "=== Python Versions ==="
          sudo du -sh /opt/hostedtoolcache/Python/* 2>/dev/null | sort -rh
          
          echo ""
          echo "=== Node.js Versions ==="
          sudo du -sh /opt/hostedtoolcache/node/* 2>/dev/null | sort -rh
          
          echo ""
          echo "=== Go Versions ==="
          sudo du -sh /opt/hostedtoolcache/go/* 2>/dev/null | sort -rh
          
          echo ""
          echo "=== CodeQL Size ==="
          sudo du -sh /opt/hostedtoolcache/CodeQL/* 2>/dev/null | sort -rh
          
          echo ""
          echo "=== Ruby Versions ==="
          sudo du -sh /opt/hostedtoolcache/Ruby/* 2>/dev/null | sort -rh
          
          echo ""
          echo "=== PyPy Versions ==="
          sudo du -sh /opt/hostedtoolcache/PyPy/* 2>/dev/null | sort -rh
          
      - name: Deep Scan /opt - Non-Toolchain
        run: |
          echo "=========================================="
          echo "/opt NON-TOOLCHAIN CONTENTS"
          echo "=========================================="
          
          echo "=== Everything in /opt except hostedtoolcache ==="
          for dir in /opt/*; do
            if [ "$dir" != "/opt/hostedtoolcache" ]; then
              sudo du -sh "$dir" 2>/dev/null
            fi
          done | sort -rh
          
          echo ""
          echo "=== /opt/az (Azure CLI) ==="
          sudo du -sh /opt/az 2>/dev/null || echo "Not present"
          if [ -d "/opt/az" ]; then
            sudo du -sh /opt/az/* 2>/dev/null | sort -rh | head -10
          fi
          
          echo ""
          echo "=== /opt/google (Google Cloud SDK) ==="
          sudo du -sh /opt/google 2>/dev/null || echo "Not present"
          if [ -d "/opt/google" ]; then
            sudo du -sh /opt/google/* 2>/dev/null | sort -rh | head -10
          fi
          
          echo ""
          echo "=== /opt/microsoft (Microsoft tools) ==="
          sudo du -sh /opt/microsoft 2>/dev/null || echo "Not present"
          if [ -d "/opt/microsoft" ]; then
            sudo du -sh /opt/microsoft/* 2>/dev/null | sort -rh | head -10
          fi
          
          echo ""
          echo "=== /opt/pipx (pipx tools) ==="
          sudo du -sh /opt/pipx 2>/dev/null || echo "Not present"
          if [ -d "/opt/pipx" ]; then
            sudo du -sh /opt/pipx/* 2>/dev/null | sort -rh | head -10
          fi

      # ============================================================
      # DEEP SCAN /usr DIRECTORY
      # ============================================================
      - name: Deep Scan /usr - Overview
        run: |
          echo "=========================================="
          echo "DEEP SCAN /usr DIRECTORY"
          echo "=========================================="
          
          echo "=== /usr Total Size ==="
          sudo du -sh /usr 2>/dev/null
          
          echo ""
          echo "=== Top-level /usr contents ==="
          sudo du -sh /usr/* 2>/dev/null | sort -rh | head -20
          
      - name: Deep Scan /usr/local
        run: |
          echo "=========================================="
          echo "/usr/local DETAILED ANALYSIS"
          echo "=========================================="
          
          echo "=== /usr/local Total Size ==="
          sudo du -sh /usr/local 2>/dev/null
          
          echo ""
          echo "=== /usr/local contents ==="
          sudo du -sh /usr/local/* 2>/dev/null | sort -rh | head -20
          
          echo ""
          echo "=== /usr/local/lib ==="
          sudo du -sh /usr/local/lib/* 2>/dev/null | sort -rh | head -15
          
          echo ""
          echo "=== Android SDK ==="
          sudo du -sh /usr/local/lib/android 2>/dev/null || echo "Not present"
          if [ -d "/usr/local/lib/android" ]; then
            sudo du -sh /usr/local/lib/android/sdk/* 2>/dev/null | sort -rh | head -15
          fi
          
          echo ""
          echo "=== /usr/local/bin ==="
          sudo du -sh /usr/local/bin/* 2>/dev/null | sort -rh | head -20
          
          echo ""
          echo "=== /usr/local/share ==="
          sudo du -sh /usr/local/share/* 2>/dev/null | sort -rh | head -15
          
          echo ""
          echo "=== GHC/Haskell ==="
          sudo du -sh /usr/local/.ghcup 2>/dev/null || echo "Not present"
          sudo du -sh /usr/local/.ghcup/* 2>/dev/null | sort -rh | head -10
          
          echo ""
          echo "=== Julia ==="
          sudo du -sh /usr/local/julia* 2>/dev/null || echo "Not present"
          
          echo ""
          echo "=== Chromium ==="
          sudo du -sh /usr/local/share/chromium 2>/dev/null || echo "Not present"
          
      - name: Deep Scan /usr/share
        run: |
          echo "=========================================="
          echo "/usr/share DETAILED ANALYSIS"
          echo "=========================================="
          
          echo "=== /usr/share Total Size ==="
          sudo du -sh /usr/share 2>/dev/null
          
          echo ""
          echo "=== Largest directories in /usr/share ==="
          sudo du -sh /usr/share/* 2>/dev/null | sort -rh | head -25
          
          echo ""
          echo "=== Swift Toolchain ==="
          sudo du -sh /usr/share/swift 2>/dev/null || echo "Not present"
          if [ -d "/usr/share/swift" ]; then
            sudo du -sh /usr/share/swift/* 2>/dev/null | sort -rh | head -10
          fi
          
          echo ""
          echo "=== Documentation (/usr/share/doc) ==="
          sudo du -sh /usr/share/doc 2>/dev/null || echo "Not present"
          sudo du -sh /usr/share/doc/* 2>/dev/null | sort -rh | head -15
          
          echo ""
          echo "=== Man Pages (/usr/share/man) ==="
          sudo du -sh /usr/share/man 2>/dev/null || echo "Not present"
          
          echo ""
          echo "=== Locales (/usr/share/locale) ==="
          sudo du -sh /usr/share/locale 2>/dev/null || echo "Not present"
          
          echo ""
          echo "=== Fonts ==="
          sudo du -sh /usr/share/fonts 2>/dev/null || echo "Not present"
          
          echo ""
          echo "=== Themes ==="
          sudo du -sh /usr/share/themes 2>/dev/null || echo "Not present"
          sudo du -sh /usr/share/icons 2>/dev/null || echo "Not present"
          
          echo ""
          echo "=== Zoneinfo (Timezone data) ==="
          sudo du -sh /usr/share/zoneinfo 2>/dev/null || echo "Not present"
          
          echo ""
          echo "=== Info pages ==="
          sudo du -sh /usr/share/info 2>/dev/null || echo "Not present"
          
          echo ""
          echo "=== I18n data ==="
          sudo du -sh /usr/share/i18n 2>/dev/null || echo "Not present"
          
      - name: Deep Scan /usr/lib
        run: |
          echo "=========================================="
          echo "/usr/lib DETAILED ANALYSIS"
          echo "=========================================="
          
          echo "=== /usr/lib Total Size ==="
          sudo du -sh /usr/lib 2>/dev/null
          
          echo ""
          echo "=== Largest directories in /usr/lib ==="
          sudo du -sh /usr/lib/* 2>/dev/null | sort -rh | head -25
          
          echo ""
          echo "=== JVM (Java Virtual Machines) ==="
          sudo du -sh /usr/lib/jvm 2>/dev/null || echo "Not present"
          if [ -d "/usr/lib/jvm" ]; then
            sudo du -sh /usr/lib/jvm/* 2>/dev/null | sort -rh
          fi
          
          echo ""
          echo "=== LLVM Versions ==="
          sudo du -sh /usr/lib/llvm-* 2>/dev/null | sort -rh
          
          echo ""
          echo "=== Google Cloud SDK ==="
          sudo du -sh /usr/lib/google-cloud-sdk 2>/dev/null || echo "Not present"
          if [ -d "/usr/lib/google-cloud-sdk" ]; then
            sudo du -sh /usr/lib/google-cloud-sdk/* 2>/dev/null | sort -rh | head -10
          fi
          
          echo ""
          echo "=== Firefox ==="
          sudo du -sh /usr/lib/firefox 2>/dev/null || echo "Not present"
          
          echo ""
          echo "=== Python ==="
          sudo du -sh /usr/lib/python* 2>/dev/null | sort -rh
          
          echo ""
          echo "=== GCC ==="
          sudo du -sh /usr/lib/gcc 2>/dev/null || echo "Not present"
          sudo du -sh /usr/lib/gcc/* 2>/dev/null | sort -rh
          
          echo ""
          echo "=== .NET / dotnet ==="
          sudo du -sh /usr/lib/dotnet 2>/dev/null || echo "Not present"
          
          echo ""
          echo "=== PostgreSQL ==="
          sudo du -sh /usr/lib/postgresql 2>/dev/null || echo "Not present"
          
          echo ""
          echo "=== Ruby ==="
          sudo du -sh /usr/lib/ruby 2>/dev/null || echo "Not present"
          
          echo ""
          echo "=== Vala ==="
          sudo du -sh /usr/lib/vala* 2>/dev/null || echo "Not present"
          
      - name: Deep Scan /usr/bin
        run: |
          echo "=========================================="
          echo "/usr/bin ANALYSIS"
          echo "=========================================="
          
          echo "=== /usr/bin Total Size ==="
          sudo du -sh /usr/bin 2>/dev/null
          
          echo ""
          echo "=== Largest binaries in /usr/bin ==="
          sudo du -sh /usr/bin/* 2>/dev/null | sort -rh | head -30
          
          echo ""
          echo "=== Large binaries (>5MB) ==="
          sudo find /usr/bin -type f -size +5M -exec ls -lh {} \; 2>/dev/null | sort -k5 -rh | head -20
          
      - name: Deep Scan /usr/include
        run: |
          echo "=========================================="
          echo "/usr/include ANALYSIS (Header Files)"
          echo "=========================================="
          
          echo "=== /usr/include Total Size ==="
          sudo du -sh /usr/include 2>/dev/null
          
          echo ""
          echo "=== Largest include directories ==="
          sudo du -sh /usr/include/* 2>/dev/null | sort -rh | head -15
          
          echo ""
          echo "=== C++ headers ==="
          sudo du -sh /usr/include/c++ 2>/dev/null || echo "Not present"
          
          echo ""
          echo "=== Linux headers ==="
          sudo du -sh /usr/include/linux 2>/dev/null || echo "Not present"
          
      - name: Analysis - Cleanup Candidates
        run: |
          echo "=========================================="
          echo "CLEANUP CANDIDATES ANALYSIS"
          echo "=========================================="
          
          echo ""
          echo "=== SAFE TO REMOVE (Not needed for standard builds) ==="
          
          echo ""
          echo "--- CodeQL (unless doing security scans) ---"
          CODEQL_SIZE=$(sudo du -sm /opt/hostedtoolcache/CodeQL 2>/dev/null | cut -f1 || echo "0")
          echo "CodeQL: ${CODEQL_SIZE}MB"
          
          echo ""
          echo "--- Documentation & Man Pages ---"
          DOC_SIZE=$(sudo du -sm /usr/share/doc 2>/dev/null | cut -f1 || echo "0")
          MAN_SIZE=$(sudo du -sm /usr/share/man 2>/dev/null | cut -f1 || echo "0")
          INFO_SIZE=$(sudo du -sm /usr/share/info 2>/dev/null | cut -f1 || echo "0")
          LOCALE_SIZE=$(sudo du -sm /usr/share/locale 2>/dev/null | cut -f1 || echo "0")
          echo "Documentation: ${DOC_SIZE}MB"
          echo "Man pages: ${MAN_SIZE}MB"
          echo "Info pages: ${INFO_SIZE}MB"
          echo "Locales: ${LOCALE_SIZE}MB"
          
          echo ""
          echo "--- Browsers (not needed for CI) ---"
          FIREFOX_SIZE=$(sudo du -sm /usr/lib/firefox 2>/dev/null | cut -f1 || echo "0")
          CHROMIUM_SIZE=$(sudo du -sm /usr/local/share/chromium 2>/dev/null | cut -f1 || echo "0")
          echo "Firefox: ${FIREFOX_SIZE}MB"
          echo "Chromium: ${CHROMIUM_SIZE}MB"
          
          echo ""
          echo "--- Extra LLVM versions ---"
          LLVM_TOTAL=0
          for llvm in /usr/lib/llvm-*; do
            if [ -d "$llvm" ]; then
              LLVM_SIZE=$(sudo du -sm "$llvm" 2>/dev/null | cut -f1)
              echo "$llvm: ${LLVM_SIZE}MB"
              LLVM_TOTAL=$((LLVM_TOTAL + LLVM_SIZE))
            fi
          done
          echo "LLVM Total: ${LLVM_TOTAL}MB"
          
          echo ""
          echo "--- Rare languages (unless specifically used) ---"
          SWIFT_SIZE=$(sudo du -sm /usr/share/swift 2>/dev/null | cut -f1 || echo "0")
          GHC_SIZE=$(sudo du -sm /usr/local/.ghcup 2>/dev/null | cut -f1 || echo "0")
          JULIA_SIZE=$(sudo du -sm /usr/local/julia* 2>/dev/null | cut -f1 || echo "0")
          echo "Swift: ${SWIFT_SIZE}MB"
          echo "Haskell/GHC: ${GHC_SIZE}MB"
          echo "Julia: ${JULIA_SIZE}MB"
          
          echo ""
          echo "=== CONDITIONAL REMOVAL (Depends on build type) ==="
          
          echo ""
          echo "--- Android SDK (needed for mobile builds) ---"
          ANDROID_SIZE=$(sudo du -sm /usr/local/lib/android 2>/dev/null | cut -f1 || echo "0")
          echo "Android SDK: ${ANDROID_SIZE}MB"
          
          echo ""
          echo "--- JVMs (needed for Java builds) ---"
          JVM_SIZE=$(sudo du -sm /usr/lib/jvm 2>/dev/null | cut -f1 || echo "0")
          echo "JVMs: ${JVM_SIZE}MB"
          
          echo ""
          echo "--- Google Cloud SDK (needed for GCP) ---"
          GCLOUD_SIZE=$(sudo du -sm /usr/lib/google-cloud-sdk 2>/dev/null | cut -f1 || echo "0")
          GCLOUD_OPT=$(sudo du -sm /opt/google 2>/dev/null | cut -f1 || echo "0")
          echo "Google Cloud (/usr/lib): ${GCLOUD_SIZE}MB"
          echo "Google Cloud (/opt): ${GCLOUD_OPT}MB"
          
          echo ""
          echo "--- Azure CLI ---"
          AZ_SIZE=$(sudo du -sm /opt/az 2>/dev/null | cut -f1 || echo "0")
          echo "Azure CLI: ${AZ_SIZE}MB"
          
          echo ""
          echo "=== SHOULD KEEP (Required for standard builds) ==="
          
          echo ""
          echo "--- Build essentials ---"
          GCC_SIZE=$(sudo du -sm /usr/lib/gcc 2>/dev/null | cut -f1 || echo "0")
          INCLUDE_SIZE=$(sudo du -sm /usr/include 2>/dev/null | cut -f1 || echo "0")
          echo "GCC: ${GCC_SIZE}MB"
          echo "Include headers: ${INCLUDE_SIZE}MB"
          
          echo ""
          echo "--- Python (usually needed) ---"
          PYTHON_SIZE=$(sudo du -sm /usr/lib/python3 2>/dev/null | cut -f1 || echo "0")
          echo "System Python: ${PYTHON_SIZE}MB"
          
          echo ""
          echo "--- Git ---"
          GIT_SIZE=$(sudo du -sm /usr/bin/git /usr/lib/git-core 2>/dev/null | awk '{sum+=$1} END {print sum}')
          echo "Git: ${GIT_SIZE}MB"

      - name: Scan Toolchains and Build Caches
        run: |
          echo "=========================================="
          echo "TOOLCHAINS & BUILD CACHES ANALYSIS"
          echo "=========================================="
          
          echo "--- Python ---"
          sudo du -sh /opt/hostedtoolcache/Python/* 2>/dev/null | sort -rh || echo "No Python cache found"
          sudo du -sh ~/.cache/pip 2>/dev/null || echo "No pip cache"
          
          echo ""
          echo "--- Node.js ---"
          sudo du -sh /opt/hostedtoolcache/node/* 2>/dev/null | sort -rh || echo "No Node cache found"
          sudo du -sh ~/.npm 2>/dev/null || echo "No npm cache"
          
          echo ""
          echo "--- Go ---"
          sudo du -sh /opt/hostedtoolcache/go/* 2>/dev/null | sort -rh || echo "No Go cache found"
          sudo du -sh ~/go/pkg 2>/dev/null || echo "No Go pkg cache"
          sudo du -sh ~/go/cache 2>/dev/null || echo "No Go build cache"
          
          echo ""
          echo "--- Rust ---"
          sudo du -sh ~/.cargo 2>/dev/null || echo "No cargo cache"
          sudo du -sh ~/.rustup 2>/dev/null || echo "No rustup cache"
          
          echo ""
          echo "--- Java ---"
          sudo du -sh /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/* 2>/dev/null | sort -rh || echo "No Java cache found"
          sudo du -sh ~/.gradle 2>/dev/null || echo "No Gradle cache"
          sudo du -sh ~/.m2 2>/dev/null || echo "No Maven cache"
          
          echo ""
          echo "--- Ruby ---"
          sudo du -sh /opt/hostedtoolcache/Ruby/* 2>/dev/null | sort -rh || echo "No Ruby cache found"
          sudo du -sh ~/.gem 2>/dev/null || echo "No gem cache"
          
          echo ""
          echo "--- .NET ---"
          sudo du -sh /opt/hostedtoolcache/dotnet/* 2>/dev/null | sort -rh || echo "No .NET cache found"
          sudo du -sh ~/.nuget 2>/dev/null || echo "No NuGet cache"
          
          echo ""
          echo "--- CodeQL ---"
          sudo du -sh /opt/hostedtoolcache/CodeQL/* 2>/dev/null | sort -rh || echo "No CodeQL cache found"

      - name: Scan System Caches and Temp
        run: |
          echo "=========================================="
          echo "SYSTEM CACHES & TEMP DIRECTORIES"
          echo "=========================================="
          
          echo "--- /var ---"
          sudo du -sh /var/* 2>/dev/null | sort -rh | head -20
          
          echo ""
          echo "--- Temp directories ---"
          sudo du -sh /tmp 2>/dev/null || echo "/tmp not accessible"
          sudo du -sh /var/tmp 2>/dev/null || echo "/var/tmp not accessible"
          
          echo ""
          echo "--- APT cache ---"
          sudo du -sh /var/cache/apt 2>/dev/null || echo "No APT cache"
          sudo du -sh /var/lib/apt 2>/dev/null || echo "No APT lib"
          
          echo ""
          echo "--- Snap packages ---"
          sudo du -sh /snap/* 2>/dev/null | sort -rh || echo "No snap packages"
          
          echo ""
          echo "--- Docker ---"
          sudo du -sh /var/lib/docker 2>/dev/null || echo "No Docker directory"
          sudo du -sh /var/lib/containerd 2>/dev/null || echo "No containerd directory"

      - name: Scan User Home Directories
        run: |
          echo "=========================================="
          echo "USER HOME DIRECTORIES ANALYSIS"
          echo "=========================================="
          
          echo "--- /home/runner detailed ---"
          sudo du -sh /home/runner 2>/dev/null || echo "No /home/runner"
          sudo du -sh /home/runner/.* 2>/dev/null | sort -rh | head -20
          sudo du -sh /home/runner/* 2>/dev/null | sort -rh | head -20
          
          echo ""
          echo "--- /home/packer ---"
          sudo du -sh /home/packer 2>/dev/null || echo "No /home/packer"
          sudo du -sh /home/packer/.* 2>/dev/null | sort -rh | head -15
          
          echo ""
          echo "--- /home/linuxbrew ---"
          sudo du -sh /home/linuxbrew 2>/dev/null || echo "No /home/linuxbrew"
          
          echo ""
          echo "--- /root ---"
          sudo du -sh /root 2>/dev/null || echo "No /root"
          
          echo ""
          echo "--- /etc/skel ---"
          sudo du -sh /etc/skel 2>/dev/null || echo "No /etc/skel"

      - name: Generate Final Summary
        run: |
          echo "=========================================="
          echo "FINAL DISK SPACE SCAN SUMMARY"
          echo "=========================================="
          
          echo ""
          echo "=== TOTAL SIZES BY DIRECTORY ==="
          sudo du -sh /opt /usr /usr/local /usr/share /usr/lib /usr/bin /home /var /lib 2>/dev/null | sort -rh
          
          echo ""
          echo "=== FINAL DISK STATUS ==="
          df -h

      - name: Create Scan Results Artifact
        run: |
          mkdir -p scan-results
          {
            echo "# Deep Disk Space Scan Results"
            echo ""
            echo "## System Information"
            echo "- Runner OS: ${{ runner.os }}"
            echo "- Architecture: ${{ runner.arch }}"
            echo "- Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "- Current Kernel: $(uname -r)"
            echo ""
            echo "## Disk Overview"
            df -h
            echo ""
            echo "## /opt Analysis"
            sudo du -sh /opt/* 2>/dev/null | sort -rh
            echo ""
            echo "## /usr/local Analysis"
            sudo du -sh /usr/local/* 2>/dev/null | sort -rh | head -20
            echo ""
            echo "## /usr/share Analysis"
            sudo du -sh /usr/share/* 2>/dev/null | sort -rh | head -20
            echo ""
            echo "## /usr/lib Analysis"
            sudo du -sh /usr/lib/* 2>/dev/null | sort -rh | head -20
            echo ""
            echo "## Toolchains"
            sudo du -sh /opt/hostedtoolcache/* 2>/dev/null | sort -rh
            echo ""
            echo "## Home Directories"
            sudo du -sh /home/* /root /etc/skel 2>/dev/null | sort -rh
          } > scan-results/scan-report.md
          
      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: disk-scan-results
          path: scan-results/
          retention-days: 1
