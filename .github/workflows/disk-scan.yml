name: Disk Space Scanner

on:
  workflow_dispatch:

jobs:
  scan-disk-space:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    
    steps:
      - name: Initial Disk Space Check
        run: |
          echo "=========================================="
          echo "INITIAL DISK SPACE STATUS (ALL FILESYSTEMS)"
          echo "=========================================="
          df -h
          echo ""
          echo "=========================================="
          echo "INODE STATUS"
          echo "=========================================="
          df -i
          echo ""
          echo "=========================================="
          echo "MOUNTED FILESYSTEMS"
          echo "=========================================="
          mount | grep -E "^/dev|^tmpfs|^efivarfs"
          
      - name: Scan Non-Root Partitions
        run: |
          echo "=========================================="
          echo "NON-ROOT PARTITION ANALYSIS"
          echo "=========================================="
          
          echo "--- /boot partition ---"
          if mountpoint -q /boot 2>/dev/null; then
            echo "Mounted as separate partition:"
            df -h /boot
            echo ""
            echo "Contents of /boot:"
            sudo du -sh /boot/* 2>/dev/null | sort -rh | head -20
            echo ""
            echo "Old kernels (potentially removable):"
            ls -la /boot/vmlinuz-* 2>/dev/null | head -20
            echo ""
            echo "Initrd files:"
            ls -lh /boot/initrd* /boot/initramfs* 2>/dev/null | head -20
          else
            echo "/boot is not a separate partition"
          fi
          
          echo ""
          echo "--- /boot/efi partition (EFI System Partition) ---"
          if mountpoint -q /boot/efi 2>/dev/null; then
            echo "Mounted as EFI System Partition:"
            df -h /boot/efi
            echo ""
            echo "Contents of /boot/efi:"
            sudo du -sh /boot/efi/* 2>/dev/null | sort -rh | head -20
          else
            echo "/boot/efi is not a separate partition"
          fi
          
          echo ""
          echo "--- tmpfs filesystems ---"
          echo "/dev/shm:"
          df -h /dev/shm
          sudo du -sh /dev/shm/* 2>/dev/null | sort -rh | head -10 || echo "Empty or not accessible"
          
          echo ""
          echo "/run:"
          df -h /run
          sudo du -sh /run/* 2>/dev/null | sort -rh | head -15
          
          echo ""
          echo "/run/lock:"
          df -h /run/lock
          sudo du -sh /run/lock/* 2>/dev/null | sort -rh | head -10 || echo "Empty"
          
      - name: Scan Memory and Runtime Filesystems
        run: |
          echo "=========================================="
          echo "MEMORY & RUNTIME FILESYSTEMS"
          echo "=========================================="
          
          echo "--- efivarfs (EFI variables) ---"
          if mountpoint -q /sys/firmware/efi/efivars 2>/dev/null; then
            df -h /sys/firmware/efi/efivars
            echo "Size of EFI variables:"
            sudo du -sh /sys/firmware/efi/efivars 2>/dev/null || echo "Not accessible"
          else
            echo "efivarfs not mounted"
          fi
          
          echo ""
          echo "--- cgroup filesystems ---"
          mount | grep cgroup | head -5
          echo ""
          echo "cgroup memory usage:"
          sudo du -sh /sys/fs/cgroup/* 2>/dev/null | sort -rh | head -10 || echo "Not accessible"
          
          echo ""
          echo "--- /proc filesystem ---"
          echo "Note: /proc is virtual, shows kernel/process info"
          ls -la /proc | head -20
          
          echo ""
          echo "--- /sys filesystem ---"
          echo "Note: /sys is virtual, shows kernel/hardware info"
          sudo du -sh /sys/* 2>/dev/null | sort -rh | head -10
          
      - name: Scan Root Directory Sizes
        run: |
          echo "=========================================="
          echo "TOP-LEVEL DIRECTORY SIZES IN ROOT"
          echo "=========================================="
          sudo du -sh /* 2>/dev/null | sort -rh | head -30
          
      - name: Scan Toolchains and Build Caches
        run: |
          echo "=========================================="
          echo "TOOLCHAINS & BUILD CACHES ANALYSIS"
          echo "=========================================="
          
          echo "--- Python ---"
          sudo du -sh /opt/hostedtoolcache/Python/* 2>/dev/null | sort -rh || echo "No Python cache found"
          sudo du -sh ~/.cache/pip 2>/dev/null || echo "No pip cache"
          
          echo ""
          echo "--- Node.js ---"
          sudo du -sh /opt/hostedtoolcache/node/* 2>/dev/null | sort -rh || echo "No Node cache found"
          sudo du -sh ~/.npm 2>/dev/null || echo "No npm cache"
          
          echo ""
          echo "--- Go ---"
          sudo du -sh /opt/hostedtoolcache/go/* 2>/dev/null | sort -rh || echo "No Go cache found"
          sudo du -sh ~/go/pkg 2>/dev/null || echo "No Go pkg cache"
          sudo du -sh ~/go/cache 2>/dev/null || echo "No Go build cache"
          
          echo ""
          echo "--- Rust ---"
          sudo du -sh ~/.cargo 2>/dev/null || echo "No cargo cache"
          sudo du -sh ~/.rustup 2>/dev/null || echo "No rustup cache"
          
          echo ""
          echo "--- Java ---"
          sudo du -sh /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/* 2>/dev/null | sort -rh || echo "No Java cache found"
          sudo du -sh ~/.gradle 2>/dev/null || echo "No Gradle cache"
          sudo du -sh ~/.m2 2>/dev/null || echo "No Maven cache"
          
          echo ""
          echo "--- Ruby ---"
          sudo du -sh /opt/hostedtoolcache/Ruby/* 2>/dev/null | sort -rh || echo "No Ruby cache found"
          sudo du -sh ~/.gem 2>/dev/null || echo "No gem cache"
          
          echo ""
          echo "--- .NET ---"
          sudo du -sh /opt/hostedtoolcache/dotnet/* 2>/dev/null | sort -rh || echo "No .NET cache found"
          sudo du -sh ~/.nuget 2>/dev/null || echo "No NuGet cache"
          
          echo ""
          echo "--- CodeQL ---"
          sudo du -sh /opt/hostedtoolcache/CodeQL/* 2>/dev/null | sort -rh || echo "No CodeQL cache found"
          
      - name: Scan System Caches and Temp
        run: |
          echo "=========================================="
          echo "SYSTEM CACHES & TEMP DIRECTORIES"
          echo "=========================================="
          
          echo "--- /var ---"
          sudo du -sh /var/* 2>/dev/null | sort -rh | head -20
          
          echo ""
          echo "--- /usr ---"
          sudo du -sh /usr/* 2>/dev/null | sort -rh | head -15
          
          echo ""
          echo "--- Temp directories ---"
          sudo du -sh /tmp 2>/dev/null || echo "/tmp not accessible"
          sudo du -sh /var/tmp 2>/dev/null || echo "/var/tmp not accessible"
          
          echo ""
          echo "--- APT cache ---"
          sudo du -sh /var/cache/apt 2>/dev/null || echo "No APT cache"
          sudo du -sh /var/lib/apt 2>/dev/null || echo "No APT lib"
          
          echo ""
          echo "--- Snap packages ---"
          sudo du -sh /snap/* 2>/dev/null | sort -rh || echo "No snap packages"
          
          echo ""
          echo "--- Docker ---"
          sudo du -sh /var/lib/docker 2>/dev/null || echo "No Docker directory"
          
      - name: Scan Large Files and Duplicates
        run: |
          echo "=========================================="
          echo "LARGE FILES SCAN (>100MB)"
          echo "=========================================="
          sudo find / -type f -size +100M 2>/dev/null | head -50
          
          echo ""
          echo "=========================================="
          echo "SHARED LIBRARIES SIZE"
          echo "=========================================="
          sudo du -sh /usr/lib/* 2>/dev/null | sort -rh | head -15
          
          echo ""
          echo "=========================================="
          echo "LOCALE FILES SIZE"
          echo "=========================================="
          sudo du -sh /usr/share/locale 2>/dev/null || echo "No locale"
          sudo du -sh /usr/share/man 2>/dev/null || echo "No man pages"
          sudo du -sh /usr/share/doc 2>/dev/null || echo "No docs"
          
      - name: Scan GitHub Actions Specific
        run: |
          echo "=========================================="
          echo "GITHUB ACTIONS RUNNER FILES"
          echo "=========================================="
          sudo du -sh /home/runner 2>/dev/null || echo "No /home/runner"
          sudo du -sh /home/runner/work 2>/dev/null || echo "No work directory"
          sudo du -sh /home/runner/.cache 2>/dev/null || echo "No runner cache"
          sudo du -sh /home/runner/.local 2>/dev/null || echo "No runner local"
          
          echo ""
          echo "--- Actions Runner Internal ---"
          sudo du -sh /actions-runner 2>/dev/null || echo "No /actions-runner"
          sudo du -sh /home/runner/runners 2>/dev/null || echo "No runners directory"
          
      - name: Scan Runner User Directories
        run: |
          echo "=========================================="
          echo "USER HOME DIRECTORIES ANALYSIS"
          echo "=========================================="
          
          echo "--- /home/runner detailed ---"
          sudo du -sh /home/runner/.* 2>/dev/null | sort -rh | head -20
          sudo du -sh /home/runner/* 2>/dev/null | sort -rh | head -20
          
          echo ""
          echo "--- /home/packer ---"
          sudo du -sh /home/packer 2>/dev/null || echo "No /home/packer"
          sudo du -sh /home/packer/.* 2>/dev/null | sort -rh | head -15
          sudo du -sh /home/packer/* 2>/dev/null | sort -rh | head -15
          
          echo ""
          echo "--- /home/linuxbrew ---"
          sudo du -sh /home/linuxbrew 2>/dev/null || echo "No /home/linuxbrew"
          sudo du -sh /home/linuxbrew/.linuxbrew 2>/dev/null || echo "No linuxbrew"
          
          echo ""
          echo "--- /root ---"
          sudo du -sh /root 2>/dev/null || echo "No /root"
          sudo du -sh /root/.* 2>/dev/null | sort -rh | head -15
          sudo du -sh /root/* 2>/dev/null | sort -rh | head -15
          
          echo ""
          echo "--- /etc/skel ---"
          sudo du -sh /etc/skel 2>/dev/null || echo "No /etc/skel"
          sudo du -sh /etc/skel/.* 2>/dev/null | sort -rh | head -15
          
      - name: Scan Boot and Kernel Files
        run: |
          echo "=========================================="
          echo "BOOT & KERNEL FILES ANALYSIS"
          echo "=========================================="
          
          echo "--- Installed kernels ---"
          dpkg --list | grep -E 'linux-image|linux-headers' | head -20
          
          echo ""
          echo "--- Kernel modules ---"
          sudo du -sh /lib/modules/* 2>/dev/null | sort -rh
          
          echo ""
          echo "--- Old kernel cleanup candidates ---"
          CURRENT_KERNEL=$(uname -r)
          echo "Current running kernel: $CURRENT_KERNEL"
          echo ""
          echo "Old kernels that can be removed:"
          for k in /boot/vmlinuz-*; do
            if [[ ! "$k" == *"$CURRENT_KERNEL"* ]]; then
              echo "  - $(basename $k)"
            fi
          done
          
          echo ""
          echo "--- Grub configuration ---"
          sudo du -sh /boot/grub 2>/dev/null || echo "No grub directory"
          
      - name: Generate Summary Report
        run: |
          echo "=========================================="
          echo "DISK SPACE SCAN SUMMARY"
          echo "=========================================="
          
          # Calculate totals for each category
          echo ""
          echo "=== TOTAL SIZES BY CATEGORY ==="
          
          echo ""
          echo "[TOOLCHAINS]"
          TOOLCHAIN_TOTAL=0
          for path in /opt/hostedtoolcache/*; do
            if [ -d "$path" ]; then
              size=$(sudo du -sm "$path" 2>/dev/null | cut -f1)
              echo "$path: ${size}MB"
              TOOLCHAIN_TOTAL=$((TOOLCHAIN_TOTAL + size))
            fi
          done
          echo "TOTAL TOOLCHAINS: ${TOOLCHAIN_TOTAL}MB"
          
          echo ""
          echo "[LANGUAGE CACHES]"
          for cache in ~/.cargo ~/.rustup ~/.npm ~/.cache/pip ~/.gradle ~/.m2 ~/.nuget ~/.gem ~/go/pkg ~/go/cache; do
            if [ -d "$cache" ]; then
              size=$(sudo du -sm "$cache" 2>/dev/null | cut -f1)
              echo "$cache: ${size}MB"
            fi
          done
          
          echo ""
          echo "[SYSTEM CACHES]"
          for sys in /var/cache/apt /var/lib/apt /var/lib/docker /snap; do
            if [ -d "$sys" ]; then
              size=$(sudo du -sm "$sys" 2>/dev/null | cut -f1)
              echo "$sys: ${size}MB"
            fi
          done
          
          echo ""
          echo "[NON-ROOT PARTITIONS]"
          echo "=== Boot Partitions ==="
          df -h /boot /boot/efi 2>/dev/null || echo "No separate boot partitions"
          
          echo ""
          echo "=== tmpfs Usage ==="
          df -h /dev/shm /run /run/lock 2>/dev/null
          
          echo ""
          echo "[USER HOMES]"
          for home in /home/* /root; do
            if [ -d "$home" ]; then
              size=$(sudo du -sm "$home" 2>/dev/null | cut -f1)
              echo "$home: ${size}MB"
            fi
          done
          
          echo ""
          echo "=== FINAL DISK STATUS (ALL FILESYSTEMS) ==="
          df -h
          
      - name: Create Scan Results Artifact
        run: |
          mkdir -p scan-results
          {
            echo "# Disk Space Scan Results"
            echo ""
            echo "## System Information"
            echo "- Runner OS: ${{ runner.os }}"
            echo "- Architecture: ${{ runner.arch }}"
            echo "- Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "- Current Kernel: $(uname -r)"
            echo ""
            echo "## All Filesystems"
            df -h
            echo ""
            echo "## Non-Root Partitions"
            echo "### Boot Partitions"
            df -h /boot /boot/efi 2>/dev/null || echo "No separate boot partitions"
            echo ""
            echo "### tmpfs"
            df -h /dev/shm /run /run/lock 2>/dev/null
            echo ""
            echo "## /boot Contents"
            sudo du -sh /boot/* 2>/dev/null | sort -rh | head -20
            echo ""
            echo "## /boot/efi Contents"
            sudo du -sh /boot/efi/* 2>/dev/null | sort -rh | head -20
            echo ""
            echo "## User Home Directories"
            sudo du -sh /home/* /root 2>/dev/null | sort -rh
            echo ""
            echo "## Toolchains Sizes"
            sudo du -sh /opt/hostedtoolcache/* 2>/dev/null | sort -rh
            echo ""
            echo "## Largest Directories"
            sudo du -sh /* 2>/dev/null | sort -rh | head -20
            echo ""
            echo "## Language Caches"
            sudo du -sh ~/.cargo ~/.rustup ~/.npm ~/.cache/pip ~/.gradle ~/.m2 ~/.nuget ~/.gem ~/go/pkg 2>/dev/null || true
            echo ""
            echo "## System Caches"
            sudo du -sh /var/cache/apt /var/lib/apt /snap /var/lib/docker 2>/dev/null || true
            echo ""
            echo "## Kernel Modules"
            sudo du -sh /lib/modules/* 2>/dev/null | sort -rh
          } > scan-results/scan-report.md
          
      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: disk-scan-results
          path: scan-results/
          retention-days: 1
