name: Disk Space Scanner

on:
  workflow_dispatch:

jobs:
  scan-disk-space:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    
    steps:
      - name: Initial Disk Space Check
        run: |
          echo "=========================================="
          echo "INITIAL DISK SPACE STATUS (ALL FILESYSTEMS)"
          echo "=========================================="
          df -h
          echo ""
          echo "=========================================="
          echo "INODE STATUS"
          echo "=========================================="
          df -i
          echo ""
          echo "=========================================="
          echo "MOUNTED FILESYSTEMS"
          echo "=========================================="
          mount | grep -E "^/dev|^tmpfs|^efivarfs"
          
      - name: Deep Scan /opt Directory
        run: |
          echo "=========================================="
          echo "DEEP SCAN: /opt DIRECTORY"
          echo "=========================================="
          
          echo "=== Top-level /opt contents ==="
          sudo du -sh /opt/* 2>/dev/null | sort -rh
          
          echo ""
          echo "=== /opt/hostedtoolcache breakdown ==="
          if [ -d "/opt/hostedtoolcache" ]; then
            sudo du -sh /opt/hostedtoolcache/* 2>/dev/null | sort -rh
            
            echo ""
            echo "--- Python versions ---"
            if [ -d "/opt/hostedtoolcache/Python" ]; then
              sudo du -sh /opt/hostedtoolcache/Python/* 2>/dev/null | sort -rh
              echo ""
              echo "Python subdirectories (first version):"
              sudo du -sh /opt/hostedtoolcache/Python/3.*/lib/python*/site-packages 2>/dev/null | sort -rh | head -10
            fi
            
            echo ""
            echo "--- Node.js versions ---"
            if [ -d "/opt/hostedtoolcache/node" ]; then
              sudo du -sh /opt/hostedtoolcache/node/* 2>/dev/null | sort -rh
            fi
            
            echo ""
            echo "--- Go versions ---"
            if [ -d "/opt/hostedtoolcache/go" ]; then
              sudo du -sh /opt/hostedtoolcache/go/* 2>/dev/null | sort -rh
            fi
            
            echo ""
            echo "--- CodeQL ---"
            if [ -d "/opt/hostedtoolcache/CodeQL" ]; then
              sudo du -sh /opt/hostedtoolcache/CodeQL/* 2>/dev/null | sort -rh
              echo ""
              echo "CodeQL subdirectories:"
              sudo du -sh /opt/hostedtoolcache/CodeQL/*/codeql/* 2>/dev/null | sort -rh | head -10
            fi
            
            echo ""
            echo "--- PyPy ---"
            if [ -d "/opt/hostedtoolcache/PyPy" ]; then
              sudo du -sh /opt/hostedtoolcache/PyPy/* 2>/dev/null | sort -rh
            fi
            
            echo ""
            echo "--- Ruby ---"
            if [ -d "/opt/hostedtoolcache/Ruby" ]; then
              sudo du -sh /opt/hostedtoolcache/Ruby/* 2>/dev/null | sort -rh
            fi
            
            echo ""
            echo "--- Java ---"
            if [ -d "/opt/hostedtoolcache/Java_Temurin-Hotspot_jdk" ]; then
              sudo du -sh /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/* 2>/dev/null | sort -rh
            fi
            
            echo ""
            echo "--- .NET/dotnet ---"
            if [ -d "/opt/hostedtoolcache/dotnet" ]; then
              sudo du -sh /opt/hostedtoolcache/dotnet/* 2>/dev/null | sort -rh
            fi
          fi
          
          echo ""
          echo "=== Other /opt contents ==="
          for dir in /opt/*; do
            if [ "$dir" != "/opt/hostedtoolcache" ] && [ -d "$dir" ]; then
              echo ""
              echo "$dir:"
              sudo du -sh "$dir"/* 2>/dev/null | sort -rh | head -10
            fi
          done

      - name: Deep Scan /usr Directory
        run: |
          echo "=========================================="
          echo "DEEP SCAN: /usr DIRECTORY"
          echo "=========================================="
          
          echo "=== Top-level /usr contents ==="
          sudo du -sh /usr/* 2>/dev/null | sort -rh
          
          echo ""
          echo "=========================================="
          echo "=== /usr/local breakdown ==="
          echo "=========================================="
          if [ -d "/usr/local" ]; then
            sudo du -sh /usr/local/* 2>/dev/null | sort -rh
            
            echo ""
            echo "--- /usr/local/lib ---"
            sudo du -sh /usr/local/lib/* 2>/dev/null | sort -rh | head -20
            
            echo ""
            echo "--- /usr/local/bin ---"
            sudo du -sh /usr/local/bin/* 2>/dev/null | sort -rh | head -20
            
            echo ""
            echo "--- /usr/local/share ---"
            sudo du -sh /usr/local/share/* 2>/dev/null | sort -rh | head -15
            
            echo ""
            echo "--- Android SDK ---"
            if [ -d "/usr/local/lib/android" ]; then
              sudo du -sh /usr/local/lib/android/* 2>/dev/null | sort -rh
              echo ""
              echo "Android SDK subdirectories:"
              sudo du -sh /usr/local/lib/android/sdk/* 2>/dev/null | sort -rh
            fi
            
            echo ""
            echo "--- Google Cloud SDK ---"
            if [ -d "/usr/local/share/google-cloud-sdk" ] || [ -d "/usr/local/google-cloud-sdk" ]; then
              sudo du -sh /usr/local/share/google-cloud-sdk 2>/dev/null || sudo du -sh /usr/local/google-cloud-sdk 2>/dev/null
            fi
            
            echo ""
            echo "--- GHC/Haskell ---"
            if [ -d "/usr/local/.ghcup" ]; then
              sudo du -sh /usr/local/.ghcup/* 2>/dev/null | sort -rh
              sudo du -sh /usr/local/.ghcup/ghc/* 2>/dev/null | sort -rh | head -5
            fi
            
            echo ""
            echo "--- Julia ---"
            for julia in /usr/local/julia*; do
              if [ -d "$julia" ]; then
                echo "$julia:"
                sudo du -sh "$julia"/* 2>/dev/null | sort -rh | head -10
              fi
            done
            
            echo ""
            echo "--- Swift ---"
            if [ -d "/usr/local/share/swift" ] || [ -d "/usr/local/swift" ]; then
              sudo du -sh /usr/local/share/swift 2>/dev/null || sudo du -sh /usr/local/swift 2>/dev/null
            fi
          fi
          
      - name: Deep Scan /usr/lib
        run: |
          echo "=========================================="
          echo "DEEP SCAN: /usr/lib DIRECTORY"
          echo "=========================================="
          
          echo "=== Largest /usr/lib directories ==="
          sudo du -sh /usr/lib/* 2>/dev/null | sort -rh | head -25
          
          echo ""
          echo "=== JVM (Java Virtual Machines) ==="
          if [ -d "/usr/lib/jvm" ]; then
            sudo du -sh /usr/lib/jvm/* 2>/dev/null | sort -rh
            echo ""
            for jvm in /usr/lib/jvm/*; do
              if [ -d "$jvm" ]; then
                echo "$(basename $jvm) breakdown:"
                sudo du -sh "$jvm"/* 2>/dev/null | sort -rh | head -5
                echo ""
              fi
            done
          fi
          
          echo ""
          echo "=== LLVM versions ==="
          for llvm in /usr/lib/llvm-*; do
            if [ -d "$llvm" ]; then
              echo "$(basename $llvm): $(sudo du -sh "$llvm" 2>/dev/null | cut -f1)"
            fi
          done
          
          echo ""
          echo "=== Google Cloud SDK ==="
          if [ -d "/usr/lib/google-cloud-sdk" ]; then
            sudo du -sh /usr/lib/google-cloud-sdk/* 2>/dev/null | sort -rh | head -15
          fi
          
          echo ""
          echo "=== .NET runtime ==="
          if [ -d "/usr/lib/dotnet" ]; then
            sudo du -sh /usr/lib/dotnet/* 2>/dev/null | sort -rh
          fi
          
          echo ""
          echo "=== Firefox ==="
          if [ -d "/usr/lib/firefox" ]; then
            sudo du -sh /usr/lib/firefox/* 2>/dev/null | sort -rh | head -10
          fi
          
          echo ""
          echo "=== Python ==="
          sudo du -sh /usr/lib/python* 2>/dev/null | sort -rh
          
          echo ""
          echo "=== GCC ==="
          if [ -d "/usr/lib/gcc" ]; then
            sudo du -sh /usr/lib/gcc/* 2>/dev/null | sort -rh
          fi
          
          echo ""
          echo "=== PostgreSQL ==="
          if [ -d "/usr/lib/postgresql" ]; then
            sudo du -sh /usr/lib/postgresql/* 2>/dev/null | sort -rh
          fi
          
          echo ""
          echo "=== Ruby ==="
          if [ -d "/usr/lib/ruby" ]; then
            sudo du -sh /usr/lib/ruby/* 2>/dev/null | sort -rh
          fi

      - name: Deep Scan /usr/share
        run: |
          echo "=========================================="
          echo "DEEP SCAN: /usr/share DIRECTORY"
          echo "=========================================="
          
          echo "=== Largest /usr/share directories ==="
          sudo du -sh /usr/share/* 2>/dev/null | sort -rh | head -30
          
          echo ""
          echo "=== Documentation (/usr/share/doc) ==="
          sudo du -sh /usr/share/doc 2>/dev/null || echo "No doc directory"
          echo "Largest doc packages:"
          sudo du -sh /usr/share/doc/* 2>/dev/null | sort -rh | head -20
          
          echo ""
          echo "=== Man pages ==="
          sudo du -sh /usr/share/man 2>/dev/null || echo "No man pages"
          
          echo ""
          echo "=== Locales ==="
          sudo du -sh /usr/share/locale 2>/dev/null || echo "No locale directory"
          echo "Largest locales:"
          sudo du -sh /usr/share/locale/* 2>/dev/null | sort -rh | head -15
          
          echo ""
          echo "=== Swift toolchain ==="
          if [ -d "/usr/share/swift" ]; then
            sudo du -sh /usr/share/swift/* 2>/dev/null | sort -rh | head -15
          fi
          
          echo ""
          echo "=== Fonts ==="
          sudo du -sh /usr/share/fonts 2>/dev/null || echo "No fonts"
          sudo du -sh /usr/share/fonts/* 2>/dev/null | sort -rh
          
          echo ""
          echo "=== Icons/Themes ==="
          sudo du -sh /usr/share/icons 2>/dev/null || echo "No icons"
          sudo du -sh /usr/share/themes 2>/dev/null || echo "No themes"
          
          echo ""
          echo "=== Applications ==="
          sudo du -sh /usr/share/applications 2>/dev/null || echo "No applications"
          sudo du -sh /usr/share/applications/* 2>/dev/null | sort -rh | head -15
          
          echo ""
          echo "=== .NET SDK ==="
          if [ -d "/usr/share/dotnet" ]; then
            sudo du -sh /usr/share/dotnet/* 2>/dev/null | sort -rh | head -15
          fi
          
          echo ""
          echo "=== PowerShell ==="
          if [ -d "/usr/local/share/powershell" ]; then
            sudo du -sh /usr/local/share/powershell/* 2>/dev/null | sort -rh
            echo ""
            echo "PowerShell modules:"
            sudo du -sh /usr/local/share/powershell/Modules/* 2>/dev/null | sort -rh | head -15
          fi

      - name: Scan /usr/bin and /usr/include
        run: |
          echo "=========================================="
          echo "SCAN: /usr/bin & /usr/include"
          echo "=========================================="
          
          echo "=== /usr/bin size ==="
          sudo du -sh /usr/bin 2>/dev/null
          echo ""
          echo "Largest binaries:"
          sudo du -sh /usr/bin/* 2>/dev/null | sort -rh | head -30
          
          echo ""
          echo "=== /usr/sbin size ==="
          sudo du -sh /usr/sbin 2>/dev/null
          echo "Largest sbin binaries:"
          sudo du -sh /usr/sbin/* 2>/dev/null | sort -rh | head -15
          
          echo ""
          echo "=== /usr/include size ==="
          sudo du -sh /usr/include 2>/dev/null
          echo "Largest include directories:"
          sudo du -sh /usr/include/* 2>/dev/null | sort -rh | head -15

      - name: Analyze Build Tool Requirements
        run: |
          echo "=========================================="
          echo "BUILD TOOL REQUIREMENTS ANALYSIS"
          echo "=========================================="
          
          echo "=== Tools commonly needed for builds ==="
          echo ""
          echo "--- Compilers ---"
          which gcc g++ clang make cmake 2>/dev/null || true
          dpkg -l | grep -E 'build-essential|gcc|g\+\+|clang|make|cmake' | head -10
          
          echo ""
          echo "--- Version Control ---"
          which git svn 2>/dev/null || true
          sudo du -sh /usr/bin/git /usr/bin/svn 2>/dev/null || true
          
          echo ""
          echo "--- Package Managers ---"
          which npm yarn pnpm pip pip3 2>/dev/null || true
          which apt apt-get dpkg 2>/dev/null || true
          
          echo ""
          echo "--- Container Tools ---"
          which docker podman 2>/dev/null || true
          sudo du -sh /usr/bin/docker /usr/bin/podman 2>/dev/null || true
          
          echo ""
          echo "--- Archive Tools ---"
          which tar unzip gzip xz 7z 2>/dev/null || true
          
          echo ""
          echo "=== Potentially removable for build-only runners ==="
          echo ""
          echo "--- Browsers ---"
          which firefox chromium-browser google-chrome 2>/dev/null || true
          sudo du -sh /usr/bin/firefox /usr/bin/chromium-browser 2>/dev/null || true
          
          echo ""
          echo "--- Office/Productivity ---"
          dpkg -l | grep -E 'libreoffice|thunderbird|evince' | head -5 || echo "None found"
          
          echo ""
          echo "--- Media ---"
          dpkg -l | grep -E 'vlc|gimp|inkscape' | head -5 || echo "None found"

      - name: Cleanup Recommendations
        run: |
          echo "=========================================="
          echo "CLEANUP RECOMMENDATIONS"
          echo "=========================================="
          
          echo ""
          echo "=== SAFE TO REMOVE (for most builds) ==="
          echo ""
          echo "[HIGH IMPACT - Large space savings]"
          echo "Items that can be safely removed for typical CI/CD builds:"
          echo ""
          
          # Calculate sizes
          CODEQL_SIZE=$(sudo du -sm /opt/hostedtoolcache/CodeQL 2>/dev/null | cut -f1 || echo 0)
          SWIFT_SIZE=$(sudo du -sm /usr/share/swift 2>/dev/null | cut -f1 || echo 0)
          GHCUP_SIZE=$(sudo du -sm /usr/local/.ghcup 2>/dev/null | cut -f1 || echo 0)
          JULIA_SIZE=$(sudo du -sm /usr/local/julia* 2>/dev/null | awk '{sum+=$1} END {print sum}' || echo 0)
          FIREFOX_SIZE=$(sudo du -sm /usr/lib/firefox 2>/dev/null | cut -f1 || echo 0)
          CHROMIUM_SIZE=$(sudo du -sm /usr/local/share/chromium 2>/dev/null | cut -f1 || echo 0)
          LLVM_TOTAL=0
          for llvm in /usr/lib/llvm-*; do
            if [ -d "$llvm" ]; then
              size=$(sudo du -sm "$llvm" 2>/dev/null | cut -f1 || echo 0)
              LLVM_TOTAL=$((LLVM_TOTAL + size))
            fi
          done
          ANDROID_SIZE=$(sudo du -sm /usr/local/lib/android 2>/dev/null | cut -f1 || echo 0)
          DOCKER_SIZE=$(sudo du -sm /var/lib/docker 2>/dev/null | cut -f1 || echo 0)
          RUSTUP_SIZE=$(sudo du -sm /home/runner/.rustup 2>/dev/null | cut -f1 || echo 0)
          SKEL_SIZE=$(sudo du -sm /etc/skel/.rustup /etc/skel/.cargo /etc/skel/.dotnet 2>/dev/null | awk '{sum+=$1} END {print sum}' || echo 0)
          PACKER_SIZE=$(sudo du -sm /home/packer 2>/dev/null | cut -f1 || echo 0)
          LINUXBREW_SIZE=$(sudo du -sm /home/linuxbrew 2>/dev/null | cut -f1 || echo 0)
          MAN_SIZE=$(sudo du -sm /usr/share/man 2>/dev/null | cut -f1 || echo 0)
          DOC_SIZE=$(sudo du -sm /usr/share/doc 2>/dev/null | cut -f1 || echo 0)
          LOCALE_SIZE=$(sudo du -sm /usr/share/locale 2>/dev/null | cut -f1 || echo 0)
          PWSH_SIZE=$(sudo du -sm /usr/local/share/powershell 2>/dev/null | cut -f1 || echo 0)
          GCS_SIZE=$(sudo du -sm /usr/lib/google-cloud-sdk 2>/dev/null | cut -f1 || echo 0)
          MINIKUBE_SIZE=$(sudo du -sm /usr/local/bin/minikube 2>/dev/null | cut -f1 || echo 0)
          
          echo "CodeQL (security scanning):        ${CODEQL_SIZE}MB"
          echo "Swift toolchain:                   ${SWIFT_SIZE}MB"
          echo "Haskell/GHC:                       ${GHCUP_SIZE}MB"
          echo "Julia:                             ${JULIA_SIZE}MB"
          echo "Firefox:                           ${FIREFOX_SIZE}MB"
          echo "Chromium:                          ${CHROMIUM_SIZE}MB"
          echo "LLVM versions (extra):             ${LLVM_TOTAL}MB"
          echo "Android SDK:                       ${ANDROID_SIZE}MB"
          echo "Docker images:                     ${DOCKER_SIZE}MB"
          echo "Rust toolchains:                   ${RUSTUP_SIZE}MB"
          echo "/etc/skel duplicates:              ${SKEL_SIZE}MB"
          echo "/home/packer:                      ${PACKER_SIZE}MB"
          echo "Linuxbrew:                         ${LINUXBREW_SIZE}MB"
          echo "Man pages:                         ${MAN_SIZE}MB"
          echo "Documentation:                     ${DOC_SIZE}MB"
          echo "Locales:                           ${LOCALE_SIZE}MB"
          echo "PowerShell modules:                ${PWSH_SIZE}MB"
          echo "Google Cloud SDK:                  ${GCS_SIZE}MB"
          echo "Minikube:                          ${MINIKUBE_SIZE}MB"
          
          TOTAL=$((CODEQL_SIZE + SWIFT_SIZE + GHCUP_SIZE + JULIA_SIZE + FIREFOX_SIZE + CHROMIUM_SIZE + LLVM_TOTAL + ANDROID_SIZE + DOCKER_SIZE + RUSTUP_SIZE + SKEL_SIZE + PACKER_SIZE + LINUXBREW_SIZE + MAN_SIZE + DOC_SIZE + LOCALE_SIZE + PWSH_SIZE + GCS_SIZE + MINIKUBE_SIZE))
          
          echo ""
          echo "═══════════════════════════════════════"
          echo "TOTAL POTENTIAL SAVINGS: ${TOTAL}MB"
          echo "═══════════════════════════════════════"
          
          echo ""
          echo "=== KEEP FOR STANDARD BUILDS ==="
          echo ""
          echo "[ESSENTIAL - Do not remove]"
          echo "- GCC/G++ (C/C++ compilation)"
          echo "- Make/CMake (build systems)"
          echo "- Git (version control)"
          echo "- Python 3 (many build scripts)"
          echo "- Node.js (if building JS/TS projects)"
          echo "- npm/yarn/pnpm (package managers)"
          echo "- pip (Python package manager)"
          echo "- tar/unzip/gzip (archive tools)"
          echo "- curl/wget (downloads)"
          
          echo ""
          echo "[CONDITIONAL - Keep based on project type]"
          echo "- Go toolchain (if building Go)"
          echo "- Java JDK (if building Java/Kotlin)"
          echo "- .NET SDK (if building .NET)"
          echo "- Ruby (if building Ruby)"
          echo "- Docker (if building containers)"

      - name: Generate Summary Report
        run: |
          echo "=========================================="
          echo "DISK SPACE SCAN SUMMARY"
          echo "=========================================="
          
          df -h /
          echo ""
          
          echo "=== /usr SIZE BREAKDOWN ==="
          sudo du -sh /usr/* 2>/dev/null | sort -rh | head -10
          
          echo ""
          echo "=== /opt SIZE BREAKDOWN ==="
          sudo du -sh /opt/* 2>/dev/null | sort -rh
          
          echo ""
          echo "=== KEY CLEANUP TARGETS ==="
          sudo du -sh /opt/hostedtoolcache/CodeQL /usr/share/swift /usr/local/.ghcup /usr/lib/firefox /usr/local/lib/android /var/lib/docker 2>/dev/null | sort -rh
          
      - name: Create Scan Results Artifact
        run: |
          mkdir -p scan-results
          {
            echo "# Disk Space Deep Scan Results"
            echo ""
            echo "## System Information"
            echo "- Runner OS: ${{ runner.os }}"
            echo "- Architecture: ${{ runner.arch }}"
            echo "- Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "- Current Kernel: $(uname -r)"
            echo ""
            echo "## Disk Usage Summary"
            df -h
            echo ""
            echo "## /usr Breakdown"
            sudo du -sh /usr/* 2>/dev/null | sort -rh
            echo ""
            echo "## /opt Breakdown"
            sudo du -sh /opt/* 2>/dev/null | sort -rh
            echo ""
            echo "## /usr/local Breakdown"
            sudo du -sh /usr/local/* 2>/dev/null | sort -rh
            echo ""
            echo "## /usr/lib Breakdown"
            sudo du -sh /usr/lib/* 2>/dev/null | sort -rh | head -25
            echo ""
            echo "## /usr/share Breakdown"
            sudo du -sh /usr/share/* 2>/dev/null | sort -rh | head -25
            echo ""
            echo "## Toolchain Sizes"
            sudo du -sh /opt/hostedtoolcache/* 2>/dev/null | sort -rh
          } > scan-results/deep-scan-report.md
          
      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: disk-deep-scan-results
          path: scan-results/
          retention-days: 1
